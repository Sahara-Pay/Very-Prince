<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#6366f1" />
    <title>Offline — Very-Prince</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0a0e1a;
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        color: #ffffff;
        overflow: hidden;
      }

      /* Ambient background gradient */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background: radial-gradient(
            ellipse at 20% 50%,
            rgba(99, 102, 241, 0.15) 0%,
            transparent 50%
          ),
          radial-gradient(
            ellipse at 80% 20%,
            rgba(139, 92, 246, 0.1) 0%,
            transparent 50%
          ),
          radial-gradient(
            ellipse at 50% 80%,
            rgba(236, 72, 153, 0.08) 0%,
            transparent 50%
          );
        pointer-events: none;
        z-index: 0;
      }

      .container {
        position: relative;
        z-index: 1;
        text-align: center;
        padding: 2rem;
        max-width: 420px;
      }

      /* Glassmorphic card */
      .card {
        background: rgba(255, 255, 255, 0.06);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 1.5rem;
        padding: 3rem 2rem;
        box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
      }

      /* Offline icon */
      .icon-wrapper {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 80px;
        height: 80px;
        border-radius: 1.25rem;
        background: linear-gradient(135deg, #4338ca, #6366f1);
        margin-bottom: 1.5rem;
        box-shadow: 0 10px 30px rgba(99, 102, 241, 0.3);
      }

      .icon-wrapper svg {
        width: 40px;
        height: 40px;
        color: white;
        opacity: 0.9;
      }

      h1 {
        font-size: 1.5rem;
        font-weight: 700;
        margin-bottom: 0.75rem;
        background: linear-gradient(to right, #e0e7ff, #ffffff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      p {
        font-size: 0.9rem;
        line-height: 1.6;
        color: rgba(255, 255, 255, 0.55);
        margin-bottom: 2rem;
      }

      .retry-btn {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.75rem 1.75rem;
        border: none;
        border-radius: 0.75rem;
        background: linear-gradient(135deg, #4f46e5, #7c3aed);
        color: white;
        font-size: 0.875rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
        box-shadow: 0 8px 20px rgba(79, 70, 229, 0.3);
      }

      .retry-btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 12px 28px rgba(79, 70, 229, 0.4);
        filter: brightness(1.1);
      }

      .retry-btn:active {
        transform: scale(0.97);
      }

      .retry-btn svg {
        width: 16px;
        height: 16px;
      }

      /* Subtle pulse animation on icon */
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.7;
        }
      }

      .icon-wrapper {
        animation: pulse 3s ease-in-out infinite;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card">
        <!-- Wifi-off icon -->
        <div class="icon-wrapper">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M8.288 15.038a5.25 5.25 0 017.424 0M5.106 11.856c3.807-3.808 9.98-3.808 13.788 0M1.924 8.674c5.565-5.565 14.587-5.565 20.152 0M12.53 18.22l-.53.53-.53-.53a.75.75 0 011.06 0z"
            />
            <line
              x1="3"
              y1="3"
              x2="21"
              y2="21"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
            />
          </svg>
        </div>

        <h1>You&rsquo;re Offline</h1>
        <p>
          It looks like you&rsquo;ve lost your internet connection. Check your
          network and try again to continue using Very-Prince.
        </p>

        <button class="retry-btn" onclick="window.location.reload()">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="2"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182"
            />
          </svg>
          Try Again
        </button>
      </div>
    </div>
  </body>
</html>
